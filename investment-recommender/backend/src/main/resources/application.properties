# ── Server ──────────────────────────────────────────────────────────────
server.port=8080

# ── Application ──────────────────────────────────────────────────────────
spring.application.name=investment-recommender

# ── Database (disabled for local dummy-data mode) ────────────────────────
# To connect to PostgreSQL in production, set SPRING_PROFILES_ACTIVE=prod
# and provide the following environment variables:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.example.recommender=INFO
